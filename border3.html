<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Princess+Sofia&family=Sofia+Sans+Extra+Condensed:ital,wght@0,1..1000;1,1..1000&display=swap" rel="stylesheet">






    <style>
        h1{
            color:crimson;
            background-color:greenyellow;
            font-size: 50px;
            text-align: center;
            text-direction:rtl;
            unicode-bidi: bidi-override;
             text-decoration:underline;
             text-decoration-style: wavy;
             font-family: "Princess Sofia", cursive;
              text-shadow: 1px 2px  blueviolet;
        }
               

            p{
                text-indent: 20px;
             color:blue;
             font-size:30px;
             white-space: no wrap;
            text-decoration-style:dotted;
            font-weight: 900;
            text-transform: capitalize;
            text-shadow: 2px 1px ;
            word-spacing:60px;
            overflow-x: scroll;
            white-space: now wrap;

        
            
        }
        div{
            height:200px;
            overflow: scroll;
        }

      
    </style>
</head>
<body>
    <h1> this is a text property</h1>
    <p>we are learning css </p>
    <div>
        <img src="download.jpg">

    </div>
    
    
</body>
</html>
