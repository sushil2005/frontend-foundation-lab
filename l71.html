<!DOCTYPE html>
<html>
<head>
<title>Registration Form</title>

<style>
body{
    background:skyblue;
    font-family:Arial;
}
form{
    width:350px;
    margin:auto;
    background:white;
    padding:20px;
    border:2px solid black;
}
h2{
    text-align:center;
}
input,select{
    width:100%;
    padding:8px;
    margin:5px 0;
}
input[type=submit]{
    background:green;
    color:white;
}
</style>

</head>
<body>

<form>
<h2>Registration Form</h2>

First Name:
<input type="text">

Last Name:
<input type="text">

Email:
<input type="email">

Password:
<input type="password">

Gender:
<input type="radio" name="g">Male
<input type="radio" name="g">Female

<br><br>

Country:
<select>
<option>Nepal</option>
<option>India</option>
<option>China</option>
</select>

<br><br>

<input type="submit" value="Register">

</form>

</body>
</html>
