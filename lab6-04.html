<!DOCTYPE html>
<html lang="en">
<head>
<title>Hover</title>

<style>

a:link{
    color:blue;
    text-decoration:underline;
}

a:visited{
    color:aqua;
}

a:hover{
    color:aqua;
    font-size:150%;
    background-color:orangered;
    font-family:monospace;
    text-decoration:wavy;
    text-decoration-color:yellow;
}

a:active{
    color:green;
}


</style>
</head>
