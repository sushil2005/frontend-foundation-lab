<!DOCTYPE html>
<html>
<head>
    <title>Payment Form</title>

    <style>
        body{
            margin:0;
            font-family:Arial;
            background:cyan;
        }

        .box{
            width:300px;
            background:gold;
            margin:50px auto;
            padding:20px;
            border-radius:10px;
            text-align:center;
        }

        h2{
            color:#444;
        }

        input{
            width:95%;
            padding:10px;
            margin:8px 0;
        }

        .pay{
            width:100%;
            padding:10px;
            background:limegreen;
            color:white;
            border:none;
            font-size:18px;
            cursor:pointer;
        }
    </style>

</head>

<body>

<div class="box">

<h2>Payment Details</h2>

<input type="text" placeholder="Full Name">

<input type="email" placeholder="Email">

<input type="text" placeholder="Card Number">

<input type="date">

<input type="password" placeholder="CVV">

<p>Accepted</p>

<img src="mastercard.png" width="40">
<img src="visa.png" width="40">

<br><br>

<button class="pay">Pay</button>

</div>

</body>
</html>
