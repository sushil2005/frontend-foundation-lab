<!DOCTYPE html>
<html>
<head>
    <title>Form</title>
</head>
<body>

<form>
<table border="1">

<tr>
    <th>Name</th>
    <th>Value</th>
</tr>

<tr>
    <td>Name</td>
    <td><input type="text"></td>
</tr>

<tr>
    <td>Sex</td>
    <td>
        <input type="radio" name="sex">Male
        <br>
        <input type="radio" name="sex">Female
    </td>
</tr>

<tr>
    <td>Eye Color</td>
    <td>
        <select>
            <option>Green</option>
            <option>Blue</option>
            <option>Black</option>
        </select>
    </td>
</tr>

<tr>
    <td>Check all that apply</td>
    <td>
        <input type="checkbox">Over 6 feet tall<br>
        <input type="checkbox">Over 200 pounds
    </td>
</tr>

<tr>
    <td colspan="2">
        Describe your athletic ability:<br>
        <textarea rows="5" cols="40"></textarea>
    </td>
</tr>

<tr>
    <td colspan="2" align="center">
        <input type="submit" value="Enter my information">
    </td>
</tr>

</table>
</form>

</body>
</html>
