<!DOCTYPE html>
<html>
<head>
<title>Flex Layout</title>

<style>

body{
    font-family:Arial;
}

.container{
    display:flex;
    flex-direction:column;
    width:90%;
    margin:auto;
    text-align:center;
}

.header{
    background:lightgray;
    padding:20px;
    margin:5px;
}

.nav{
    background:lightgray;
    padding:15px;
    margin:5px;
}

.middle{
    display:flex;
}

.left{
    flex:1;
    background:lightgray;
    margin:5px;
    padding:80px 0;
}

.main{
    flex:2;
    background:lightgray;
    margin:5px;
    padding:80px 0;
}

.right{
    flex:1;
    background:lightgray;
    margin:5px;
    padding:80px 0;
}

.footer{
    background:lightgray;
    padding:20px;
    margin:5px;
}

</style>

</head>

<body>

<div class="container">

<div class="header">Header</div>

<div class="nav">Navigation Menu</div>

<div class="middle">

<div class="left">Content</div>

<div class="main">Main Content</div>

<div class="right">Content</div>

</div>

<div class="footer">Footer</div>

</div>

</body>
</html>
