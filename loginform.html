<!-- Beautiful HTML-only login form -->
<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Login</title>
   <style>
      * {
         box-sizing: border-box;
         margin: 0;
         padding: 0;
      }
      body {
         min-height: 100vh;
         font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
         background: linear-gradient(135deg, #556fff 0%, #42c7ff 45%, #89f7fe 100%);
         color: #1f305e;
         display: flex;
         align-items: center;
         justify-content: center;
         padding: 20px;
      }
      .login-card {
         width: min(420px, 100%);
         background: rgba(255, 255, 255, 0.95);
         border-radius: 28px;
         box-shadow: 0 24px 80px rgba(16, 46, 103, 0.18);
         overflow: hidden;
      }
      .login-header {
         background: linear-gradient(135deg, #2a58d2, #58b0ff);
         padding: 40px 30px;
         text-align: center;
         color: #ffffff;
      }
      .login-header h1 {
         font-size: 2rem;
         letter-spacing: 0.04em;
         margin-bottom: 8px;
      }
      .login-header p {
         opacity: 0.9;
         font-size: 0.95rem;
      }
      .login-body {
         padding: 32px 30px 36px;
      }
      .login-body label {
         display: block;
         margin-bottom: 8px;
         font-size: 0.95rem;
         font-weight: 600;
      }
      .login-body input {
         width: 100%;
         border: 1px solid #d5def9;
         border-radius: 16px;
         padding: 14px 16px;
         font-size: 1rem;
         transition: border-color 0.25s ease, box-shadow 0.25s ease;
         background: #f7fbff;
         color: #1f305e;
      }
      .login-body input:focus {
         outline: none;
         border-color: #3f82ff;
         box-shadow: 0 0 0 4px rgba(92, 146, 255, 0.16);
      }
      .field-group {
         margin-bottom: 20px;
      }
      .checkbox-row {
         display: flex;
         align-items: center;
         justify-content: space-between;
         margin-bottom: 24px;
         font-size: 0.92rem;
      }
      .checkbox-row input {
         margin-right: 10px;
      }
      .login-button {
         width: 100%;
         border: none;
         border-radius: 16px;
         padding: 15px 0;
         font-size: 1rem;
         font-weight: 700;
         color: #ffffff;
         background: linear-gradient(135deg, #3f7aff, #1da1ff);
         cursor: pointer;
         transition: transform 0.2s ease, box-shadow 0.2s ease;
      }
      .login-button:hover {
         transform: translateY(-1px);
         box-shadow: 0 14px 28px rgba(31, 69, 174, 0.2);
      }
      .login-footer {
         margin-top: 24px;
         text-align: center;
         font-size: 0.95rem;
         color: #4a5e8d;
      }
      .login-footer a {
         color: #3f7aff;
         text-decoration: none;
         font-weight: 600;
      }
      .login-footer a:hover {
         text-decoration: underline;
      }
   </style>
</head>
<body>
   <section class="login-card">
      <div class="login-header">
         <h1>Welcome Back</h1>
         <p>Sign in to continue to your account.</p>
      </div>
      <div class="login-body">
         <form>
            <div class="field-group">
               <label for="email">Email address</label>
               <input type="email" id="email" placeholder="name@example.com" required>
            </div>
            <div class="field-group">
               <label for="password">Password</label>
               <input type="password" id="password" placeholder="Enter your password" required>
            </div>
            <div class="checkbox-row">
               <label>
                  <input type="checkbox">
                  Remember me
               </label>
               <a href="#">Forgot password?</a>
            </div>
            <button type="submit" class="login-button">Log In</button>
         </form>
         <div class="login-footer">
            Don’t have an account? <a href="#">Sign up</a>
         </div>
      </div>
   </section>
</body>
</html>
