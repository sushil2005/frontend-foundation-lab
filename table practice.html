<!DOCTYPE html>
<html>
<head>
  <title>Table Example</title>
  <style>
    table {
        
    }

    table, th, td {
      border: 1px solid black;
    }

    th, td {
      padding:0px;
      vertical-align: top;
    }
  </style>
</head>

<body>

<table>
  <tr>
    <th>Column 1</th>
    <th>Column 2</th>
  </tr>

  <tr>
    <td>
      This is a paragraph <br>
      This is another paragraph
    </td>

    <td>
      This cell contains a table:
      <table>
        <tr>
          <td>A</td>
          <td>B</td>
        </tr>
        <tr>
          <td>C</td>
          <td>D</td>
        </tr>
      </table>
    </td>
  </tr>

  <tr>
    <td>
      This cell contains a list:
      <ul>
        <li>apples</li>
        <li>bananas</li>
        <li>pineapples</li>
      </ul>
    </td>

    <td>
      HELLO
    </td>
  </tr>

</table>

</body>
</html>
