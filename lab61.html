<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        p{
            color: blue;
            font-size: medium;
        }
    </style>

    <link rel="stylesheet" href="Css1.css">
</head>
<body>

<h1>Internal CSS</h1>
<p style="color: green;">
 Inside the internal css ,the css is apply within the style tag inside the head section of the html documenent.
</p>

<h1>Inline CSS</h1>
<p style="color:red;">
The Inline css is written with element in html code using style element.

</p>

<h1>External CSS</h1>
<p>
    The External css is written in separate.css file to style any html code.

</p>

</body>
</html>
